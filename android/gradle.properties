org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Project and Pub cache live on different drives (D:\ vs C:\); the Kotlin
# incremental compiler's relative-path cache resolution throws
# "different roots" in that case. Non-incremental compilation avoids it.
kotlin.incremental=false
